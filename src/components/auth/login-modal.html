<!-- Login Modal -->
<div id="login-modal" class="fixed inset-0 z-[10001] hidden items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
  <div class="relative bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-slideUp">
    <div class="p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-4 shadow-lg">
          🎓
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Bem-vindo ao UniAgenda</h2>
        <p class="text-gray-500 text-sm mt-1">Faça login para continuar</p>
      </div>

      <!-- Botões de login social -->
      <div class="space-y-3">
        <!-- Login com Vercel -->
        <button id="login-vercel" class="w-full flex items-center justify-center gap-3 bg-black text-white py-3 rounded-xl font-semibold hover:bg-gray-800 transition-colors shadow-md hover:shadow-lg">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 22h-24l12-20z"/>
          </svg>
          Entrar com Vercel
        </button>
        
        <!-- Login com Google -->
        <button id="login-google" class="w-full flex items-center justify-center gap-3 bg-white text-gray-700 py-3 rounded-xl font-semibold border border-gray-300 hover:bg-gray-50 transition-colors shadow-md hover:shadow-lg">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Entrar com Google
        </button>
        
        <!-- Login com GitHub -->
        <button id="login-github" class="w-full flex items-center justify-center gap-3 bg-gray-800 text-white py-3 rounded-xl font-semibold hover:bg-gray-700 transition-colors shadow-md hover:shadow-lg">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          Entrar com GitHub
        </button>
      </div>

      <!-- Divisor -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-gray-400">ou</span>
        </div>
      </div>

      <!-- Abas: Login / Cadastro -->
      <div class="flex border-b border-gray-200 mb-4">
        <button id="tab-login" class="flex-1 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600">Login</button>
        <button id="tab-register" class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Cadastro</button>
      </div>

      <!-- Formulário de Login -->
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="login-email" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="seu@email.com" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input type="password" id="login-password" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••" required>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-md">
          Entrar
        </button>
      </form>

      <!-- Formulário de Cadastro -->
      <form id="register-form" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome completo</label>
          <input type="text" id="register-name" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Seu nome" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="register-email" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="seu@email.com" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input type="password" id="register-password" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
          <input type="password" id="register-confirm" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••" required>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-md">
          Criar conta
        </button>
      </form>

      <!-- Mensagem de erro (inicialmente oculta) -->
      <div id="login-error" class="mt-4 text-center text-red-500 text-sm hidden"></div>
    </div>
  </div>
</div>

<!-- Loader de autenticação -->
<div id="auth-loader" class="fixed inset-0 z-[10002] hidden items-center justify-center bg-black/50 backdrop-blur-sm">
  <div class="bg-white p-8 rounded-2xl shadow-2xl text-center">
    <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-gray-700 font-medium" id="auth-message">Processando...</p>
  </div>
</div>

<!-- Indicador de Sincronização -->
<div id="sync-indicator" class="fixed top-20 right-4 z-[9998] hidden">
  <div class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm font-semibold shadow-lg flex items-center gap-2 animate-pulse">
    <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
    <span id="sync-message">Sincronizando...</span>
  </div>
</div>

<!-- Botão de Logout (aparece quando logado) -->
<div id="logout-container" class="fixed top-4 right-4 z-[9998] hidden">
  <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-red-600 transition-colors shadow-lg flex items-center gap-2">
    <span>🚪</span> Sair
  </button>
</div>

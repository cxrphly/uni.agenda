<!-- Modal Import/Export -->
<div class="fixed inset-0 z-[100] hidden items-center justify-center p-4" id="modal-import-export">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="modal-ie-backdrop"></div>
  <div class="relative bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
    <div class="p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-gray-800">Gerenciar Dados</h3>
        <button class="text-gray-400 hover:text-gray-600 text-2xl" id="modal-ie-close">✕</button>
      </div>
      <p class="text-sm text-gray-500 mb-6">Exporte seus dados para backup ou importe um arquivo JSON anterior.</p>
      <div class="space-y-3">
        <button class="w-full flex items-center justify-center gap-2 bg-primary text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg" id="mobile-export-btn">
          <span>💾</span> Exportar JSON
        </button>
        <button class="w-full flex items-center justify-center gap-2 bg-gray-50 text-gray-700 py-3 rounded-xl font-semibold border border-gray-200 hover:bg-gray-100 transition-colors" id="mobile-import-btn">
          <span>📂</span> Importar JSON
        </button>
      </div>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>UniAgenda - Login</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .login-card {
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4f46e5;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <!-- Loader -->
  <div id="global-loader" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl text-center">
      <div class="loader mx-auto mb-4"></div>
      <p class="text-gray-700 font-medium" id="loader-message">Processando...</p>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

  <!-- Card de Login -->
  <div class="login-card bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-700 p-8 text-white text-center">
      <div class="w-20 h-20 bg-white/20 backdrop-blur-lg rounded-2xl flex items-center justify-center text-5xl mx-auto mb-4 shadow-xl">
        🎓
      </div>
      <h1 class="text-3xl font-bold">UniAgenda</h1>
      <p class="text-indigo-100 mt-2">Seu planejador universitário</p>
    </div>

    <!-- Tabs -->
    <div class="border-b border-gray-200">
      <div class="flex">
        <button id="tab-login" class="flex-1 py-4 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600">Login</button>
        <button id="tab-register" class="flex-1 py-4 text-sm font-medium text-gray-500 hover:text-gray-700">Cadastro</button>
      </div>
    </div>

    <!-- Formulário de Login -->
    <form id="login-form" class="p-8 space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" id="login-email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="seu@email.com" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
        <input type="password" id="login-password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••" required>
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg">
        Entrar
      </button>
    </form>

    <!-- Formulário de Cadastro -->
    <form id="register-form" class="p-8 space-y-6 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Nome completo</label>
        <input type="text" id="register-name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="Seu nome" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" id="register-email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="seu@email.com" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
        <input type="password" id="register-password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="••••••••" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Confirmar senha</label>
        <input type="password" id="register-confirm" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="••••••••" required>
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg">
        Criar conta
      </button>
    </form>

    <!-- Divisor -->
    <div class="px-8 pb-8">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-gray-400">ou continue com</span>
        </div>
      </div>

      <!-- Botões sociais -->
      <div class="mt-6 grid grid-cols-3 gap-3">
        <button id="login-vercel" class="flex justify-center items-center px-4 py-3 border border-gray-300 rounded-xl hover:bg-gray-50">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 22h-24l12-20z"/>
          </svg>
        </button>
        
        <button id="login-google" class="flex justify-center items-center px-4 py-3 border border-gray-300 rounded-xl hover:bg-gray-50">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </button>
        
        <button id="login-github" class="flex justify-center items-center px-4 py-3 border border-gray-300 rounded-xl hover:bg-gray-50">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mensagem de erro -->
    <div id="error-message" class="px-8 pb-8 text-center text-red-500 text-sm hidden"></div>

  <!-- Scripts - ORDEM CORRETA -->
  <script src="/js/config.js"></script>
  <script src="/js/services/auth.js"></script>

  <script>
    // Debug para verificar se os scripts carregaram
    document.addEventListener('DOMContentLoaded', function() {
      console.log('📱 Página de login DOM carregado');
      console.log('   - window.auth:', !!window.auth);
      console.log('   - window.appConfig:', !!window.appConfig);
      
      // Verificar se os listeners das tabs estão funcionando
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      
      if (tabLogin && tabRegister) {
        console.log('✅ Tabs encontradas');
        
        // Adicionar listeners diretamente para teste
        tabLogin.addEventListener('click', function() {
          console.log('👆 Tab Login clicada');
          tabLogin.classList.add('text-indigo-600', 'border-indigo-600');
          tabRegister.classList.remove('text-indigo-600', 'border-indigo-600');
          document.getElementById('login-form')?.classList.remove('hidden');
          document.getElementById('register-form')?.classList.add('hidden');
        });
        
        tabRegister.addEventListener('click', function() {
          console.log('👆 Tab Register clicada');
          tabRegister.classList.add('text-indigo-600', 'border-indigo-600');
          tabLogin.classList.remove('text-indigo-600', 'border-indigo-600');
          document.getElementById('register-form')?.classList.remove('hidden');
          document.getElementById('login-form')?.classList.add('hidden');
        });
      } else {
        console.error('❌ Tabs não encontradas!');
      }
    });
  </script>
</body>

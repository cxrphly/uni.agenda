<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>UniAgenda - Offline</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  <div class="text-center p-8">
    <div class="text-6xl mb-4">📵</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Você está offline</h1>
    <p class="text-gray-600 mb-6">Conecte-se à internet para continuar usando o UniAgenda</p>
    <button onclick="window.location.reload()" 
            class="bg-primary text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
      Tentar reconectar
    </button>
  </div>
</body>
</html>
